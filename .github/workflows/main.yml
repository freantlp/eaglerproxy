name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Force Launch
        run: |
          npm install
          npx tsc || echo "Build had warnings"
          echo "--- ATTEMPTING PROXY LAUNCH ---"
          # The '|| true' stops it from crashing immediately so you can read the log
          node build/index.js || true 
