name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install and Build
        run: |
          npm install
          # This creates the missing 'build' folder
          npx tsc || echo "Warnings ignored"
      - name: Start Proxy
        run: |
          echo "--- LAUNCHING PROXY ---"
          # This command starts the proxy from the build folder
          node build/index.js
