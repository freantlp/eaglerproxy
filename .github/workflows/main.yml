name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Launch
        run: |
          npm install
          npx tsc || true
          echo "--- STARTING PROXY ---"
          node build/index.js
