name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Stay Alive
        run: |
          npm install
          npx tsc || true
          echo "--- STARTING PROXY ---"
          # The '&' runs it in the background so the script continues
          node build/index.js & 
          echo "Proxy is running. Keeping Action alive for 6 hours..."
          # This forces GitHub to stay open so you can play
          sleep 21600 
