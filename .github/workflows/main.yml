name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Stay Alive
        run: |
          npm install
          # This line is the fix: it manually installs the compiler
          npm install -g typescript 
          tsc || echo "Build warnings, but continuing..."
          echo "--- STARTING PROXY ---"
          # This command checks if build exists, then runs it
          node build/index.js & 
          echo "Proxy is running. Keeping Action alive for 6 hours..."
          sleep 21600 
