name: Run EaglerProxy
on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Launch
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          echo "--- Installing Dependencies ---"
          npm install
          
          echo "--- Building TypeScript ---"
          npx tsc || echo "Build warnings ignored"
          
          echo "--- Starting Proxy on Port 8080 ---"
          # This forces the proxy to use the correct port
          PORT=8080 node build/index.js &
          
          echo "Waiting 30 seconds for Proxy to initialize..."
          # This longer delay fixes the 'connection refused' error
          sleep 30
          
          echo "--- Starting ngrok Tunnel ---"
          npm install -g ngrok
          ngrok config add-authtoken $NGROK_AUTH
          # Tunnel to port 8080 where the proxy is listening
          ngrok http 8080 --log=stdout & 
          
          echo "--- PROXY IS LIVE ---"
          # Keeps the action running for 6 hours
          sleep 21600
