  name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Launch
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          npm install
          npx tsc || echo "Build warnings ignored"
          
          # Install and configure ngrok
          npm install -g ngrok
          ngrok config add-authtoken $NGROK_AUTH
          
          # Start ngrok on port 8080 (Matches the proxy port)
          ngrok http 8080 --log=stdout & 
          
          echo "--- STARTING PROXY ON PORT 8080 ---"
          # Force the proxy to use port 8080
          PORT=8080 node build/index.js &
          
          # Keep the action running for 6 hours
          echo "Proxy is live. Keeping Action alive..."
          sleep 21600
