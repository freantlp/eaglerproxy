name: Run EaglerProxy
on: 
  workflow_dispatch: 
  schedule:
    - cron: '0 */4 * * *'

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # This makes the warning go away
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # Using the newer version they want
      - name: Install and Build
        run: |
          npm install
          npx tsc || true
      - name: Start Proxy
        run: node build/index.js
