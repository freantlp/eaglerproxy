      - name: Build and Launch
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          npm install
          npx tsc || echo "Build warnings ignored"
          npm install -g ngrok
          ngrok config add-authtoken $NGROK_AUTH
          
          # Start the Proxy FIRST in the background
          echo "--- STARTING PROXY ---"
          PORT=8080 node build/index.js &
          
          # Wait 10 seconds for the proxy to actually start
          sleep 10
          
          # Now start ngrok on port 8080
          echo "--- STARTING NGROK TUNNEL ---"
          ngrok http 8080 --log=stdout & 
          
          # Keep the action alive
          sleep 21600
