name: Run EaglerProxy
on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Launch
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          npm install
          npx tsc || echo "Build warnings ignored"
          npm install -g ngrok
          ngrok config add-authtoken $NGROK_AUTH
          
          # Start the Proxy FIRST
          echo "--- STARTING PROXY ---"
          PORT=8080 node build/index.js &
          
          # Wait for the proxy to start before ngrok looks for it
          sleep 15
          
          # Start ngrok on port 8080
          echo "--- STARTING NGROK TUNNEL ---"
          ngrok http 8080 --log=stdout & 
          
          # Keep the action alive for 6 hours
          sleep 21600
