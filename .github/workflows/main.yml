name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install & Build
        run: |
          npm install
          npx tsc || true
      - name: Start ngrok & Proxy
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          npm install -g ngrok
          ngrok config add-authtoken $NGROK_AUTH
          # Starts a tunnel to the proxy's local port
          ngrok http 8080 --log=stdout & 
          node build/index.js
