name: Run EaglerProxy
on: [workflow_dispatch]

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build and Launch
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          npm install
          npx tsc || true
          # Install and start ngrok to create your public link
          npm install -g ngrok
          ngrok config add-authtoken $NGROK_AUTH
          ngrok http 8080 --log=stdout & 
          echo "--- STARTING PROXY ---"
          node build/index.js &
          sleep 21600 # Keeps the action alive for 6 hours
