name: Run EaglerProxy
on: 
  workflow_dispatch: 

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    # This line tells GitHub to use Node 24 for everything
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4.1.7 # Updated version
      - uses: actions/setup-node@v4.0.3 # Updated version
        with:
          node-version: '24'
      - name: Install and Build
        run: |
          npm install
          npx tsc || true
      - name: Start Proxy
        run: node build/index.js
